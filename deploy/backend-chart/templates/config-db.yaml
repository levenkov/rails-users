apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configObjectName | default (printf "%s-db-config" (include "pm-backend.fullname" .)) }}
  namespace: {{ .Release.Namespace }}
data:
  database.yml: |
    production:
      adapter: postgresql
      encoding: unicode
      pool: 5
      host: {{ include "pm-backend.fullname" . }}-postgres
      database: {{ .Values.db.database }}
      username: {{ .Values.db.username }}
      password: {{ .Values.db.password }}
