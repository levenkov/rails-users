apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pm-backend.fullname" . }}-rails-credentials
  labels:
    app.kubernetes.io/name: {{ include "pm-backend.name" . }}
    helm.sh/chart: {{ include "pm-backend.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  production.yml.enc: {{ .Values.credentials.productionYmlEnc | b64enc }}
  production.key: {{ .Values.credentials.productionKey | b64enc }}
