apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pm-backend.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "pm-backend.name" . }}
    helm.sh/chart: {{ include "pm-backend.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pm-backend.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pm-backend.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - bin/rails assets:precompile && touch tmp/restart.txt
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: REDIS_URL
              value: "redis://{{ include "pm-backend.fullname" . }}-redis:6379/0"
            - name: MINIO_ENDPOINT
              value: "{{ include "pm-backend.fullname" . }}-minio:9000"
            - name: MINIO_PUBLIC_URL
              value: {{ .Values.minio.publicUrl | quote }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.credentials.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.credentials.secretKey | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: database-config
              mountPath: /app/config/database.yml
              subPath: database.yml
              readOnly: true
            - name: credentials
              mountPath: /app/config/credentials/production.yml.enc
              subPath: production.yml.enc
              readOnly: true
            - name: credentials
              mountPath: /app/config/credentials/production.key
              subPath: production.key
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: database-config
          configMap:
            name: {{ .Values.configObjectName | default (printf "%s-db-config" (include "pm-backend.fullname" .)) }}
        - name: credentials
          secret:
            secretName: {{ include "pm-backend.fullname" . }}-rails-credentials
