apiVersion: v1
kind: Service
metadata:
  name: {{ include "pm-backend.fullname" . }}-redis
  labels:
    app.kubernetes.io/name: {{ include "pm-backend.name" . }}-redis
    helm.sh/chart: {{ include "pm-backend.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: {{ include "pm-backend.name" . }}-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
