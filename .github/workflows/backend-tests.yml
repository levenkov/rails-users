name: Backend Tests

on:
  push:
    branches:
      - master
      - staging
  pull_request:
    branches:
      - master
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.4'
          bundler-cache: true
          working-directory: .

      - name: Run RuboCop
        run: bin/bundle exec rubocop

      - name: Build base images
        run: |
          docker build -t pm:latest --target app .
          docker build -t pm-builder:latest --target builder .

      - name: Build and start test services
        run: docker compose -f test/docker/docker-compose.test.yml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          until docker compose -f test/docker/docker-compose.test.yml exec -T db pg_isready -U pm; do
            echo "PostgreSQL is unavailable - sleeping"
            sleep 1
          done
          echo "PostgreSQL is ready!"

          echo "Waiting for Redis..."
          until docker compose -f test/docker/docker-compose.test.yml exec -T redis redis-cli ping; do
            echo "Redis is unavailable - sleeping"
            sleep 1
          done
          echo "Redis is ready!"

      - name: Setup test database
        run: docker compose -f test/docker/docker-compose.test.yml run --rm test bin/rails db:migrate:reset

      - name: Run tests
        run: docker compose -f test/docker/docker-compose.test.yml run --rm test bin/rails test

      #- name: Run system tests
      #  run: docker compose -f test/docker/docker-compose.test.yml run --rm test bin/rails test:system

      - name: Stop services
        if: always()
        run: docker compose -f test/docker/docker-compose.test.yml down
